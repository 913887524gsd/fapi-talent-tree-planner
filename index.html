<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talent Tree Planner</title>
    <link rel="stylesheet" href="./styles.css?v=2026.05.01" />
    <script defer src="./app.js?v=2026.05.01"></script>
  </head>
  <body>
    <div class="app-shell" id="app">
      <header class="panel topbar">
        <div class="title-group">
          <h1 data-i18n="title">Talent Tree Planner</h1>
        </div>

        <div class="topbar-actions">
          <label class="field compact">
            <span data-i18n="language">Language</span>
            <select id="languageSelect">
              <option value="auto" data-i18n="languageAuto">Auto</option>
              <option value="en">English</option>
              <option value="zh">简体中文</option>
            </select>
          </label>
        </div>
      </header>

      <section class="panel class-ribbon">
        <div class="section-heading">
          <h2 data-i18n="classSelector">Class</h2>
        </div>
        <div id="classSelector" class="class-selector"></div>
      </section>

      <section class="panel priority-card">
        <div class="section-heading">
          <h2 data-i18n="priorityTitle">Priority</h2>
        </div>

        <div id="priorityList" class="priority-list" aria-live="polite"></div>

        <div class="priority-editor" id="priorityEditor">
          <div class="priority-controls">
            <p class="priority-drag-hint" data-i18n="dragHintDesktop">Drag icons on desktop to sort</p>
            <label class="field compact priority-jump">
              <span data-i18n="targetPosition">Position</span>
              <input id="priorityPositionInput" type="number" min="1" max="16" value="1" />
            </label>
            <button
              type="button"
              class="action-btn"
              data-priority-action="left"
              data-i18n="moveLeft"
            >
              Move Left
            </button>
            <button
              type="button"
              class="action-btn"
              data-priority-action="apply"
              data-i18n="applyPosition"
            >
              Apply
            </button>
            <button
              type="button"
              class="action-btn"
              data-priority-action="right"
              data-i18n="moveRight"
            >
              Move Right
            </button>
          </div>
        </div>
      </section>

      <main class="workspace">
        <section class="panel stage">
          <div class="section-heading stage-heading">
            <h2 id="stageTitle">Talent Tree</h2>
          </div>

          <div class="tree-status">
            <label class="status-pill status-input">
              <span data-i18n="points">Talent Points</span>
              <input id="pointsInput" type="number" min="0" max="10000" value="12" />
            </label>
            <div class="status-pill">
              <span data-i18n="currentStep">Step</span>
              <strong id="currentStepValue">0 / 12</strong>
            </div>
            <div class="stage-controls">
              <div class="control-actions">
                <button type="button" class="action-btn danger" data-action="reset" data-i18n="resetSim">
                  Reset Simulation
                </button>
                <button type="button" class="action-btn" data-action="prev" data-i18n="prevStep">
                  Previous
                </button>
                <button type="button" class="action-btn primary" data-action="next" data-i18n="nextStep">
                  Next
                </button>
              </div>
              <div class="step-control">
                <input id="stepRange" type="range" min="0" max="12" value="0" />
              </div>
              <label class="field stage-jump">
                <span data-i18n="jumpToStep">Jump to Step</span>
                <input id="stepInput" type="number" min="0" max="12" value="0" />
              </label>
            </div>
          </div>

          <div id="treeBoard" class="tree-board"></div>
        </section>
      </main>
    </div>
  </body>
</html>
